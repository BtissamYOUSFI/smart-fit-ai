services:
  # REPLACEMENT FOR NGINX: Traefik (Lightweight, No config file needed)
  traefik:
    image: traefik:v3.1
    container_name: smartfit-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"       # Public access
      - "8081:8080"   # Dashboard: http://localhost:8081
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend_net

  mysql:
    image: mysql:8.4
    container_name: smartfit-mysql
    restart: always
    env_file: [.env]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ../../backend/core-api
      dockerfile: Dockerfile
    container_name: smartfit-core-api
    restart: always
    env_file: [.env]
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      mysql: { condition: service_healthy }
    networks:
      - backend_net
      - frontend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=PathPrefix(`/api`)"
      - "traefik.http.services.core.loadbalancer.server.port=8080"

  ai-api:
    build:
      context: ../../backend/ai-api
      dockerfile: Dockerfile
    container_name: smartfit-ai-api
    restart: always
    networks:
      - frontend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=PathPrefix(`/ai`)"
      - "traefik.http.services.ai.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: smartfit-frontend
    restart: always
    networks:
      - frontend_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  prometheus:
    image: prom/prometheus
    container_name: smartfit-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      # Fixed path relative to infrastructure/docker/
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - frontend_net

networks:
  frontend_net:
  backend_net:

volumes:
  mysql_data:



