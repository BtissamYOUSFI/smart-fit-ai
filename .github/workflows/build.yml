name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot JAR
        working-directory: backend/core-api
        run: mvn clean package -DskipTests -B

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push core-api image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/core-api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smartfit-core-api:latest

      - name: Build and push ai-api image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ai-api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smartfit-ai-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smartfit-frontend:latest