server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html for any unknown path (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for hashed assets produced by the Expo web build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Disable caching for the HTML entry point so updates are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
